<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>第87届中国教育装备展示会公司信息</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">第87届中国教育装备展示会</p>
      <h1>公司信息收集</h1>
    </div>
    <label class="search">
      <span>搜索</span>
      <input id="searchInput" type="search" placeholder="公司、产品、关键字、备注..." />
    </label>
  </header>
  <main>
    <section class="summary" aria-label="概览">
      <div><strong id="sheetCount">0</strong><span>分类</span></div>
      <div><strong id="recordCount">0</strong><span>条信息</span></div>
      <div><strong id="redCount">0</strong><span>重点标注</span></div>
    </section>
    <div class="toolbar" aria-label="视图和搜索范围">
      <div class="control-group" aria-label="搜索范围">
        <span>搜索范围</span>
        <button id="globalSearch" class="view-button active" type="button">全局</button>
        <button id="categorySearch" class="view-button" type="button">当前分类</button>
      </div>
      <div class="control-group" aria-label="视图切换">
        <span>视图</span>
        <button id="compareView" class="view-button active" type="button">对比表</button>
        <button id="cardView" class="view-button" type="button">卡片</button>
      </div>
    </div>
    <nav id="tabs" class="tabs" aria-label="Sheet 分类"></nav>
    <section id="content" class="content"></section>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
